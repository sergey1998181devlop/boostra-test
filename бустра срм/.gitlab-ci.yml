build-crm-stage:
  stage: build-crm
  image: docker:${DOCKER_VERSION}-dind-alpine3.16
  services:
    - docker:${DOCKER_VERSION}-dind-alpine3.16
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: never
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master" && $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - when: never
  variables:
    GIT_CLEAN_FLAGS: none
  tags:
    - develop-crm
  environment:
    name: stage-mngr
    url: https://manager.stage.boostra.ru
  script:
    - echo ${CI_KEY} | docker login --username json_key --password-stdin ${CI_REGISTRY}
    - cp ${CONFIG} ./config/config.php
    - cp ${ENV} ./config/.env
    - docker pull ${CONTAINER_IMAGE_CRM_LATEST} || true
    - docker build -t ${CONTAINER_IMAGE_CRM}  --cache-from ${CONTAINER_IMAGE_CRM_LATEST} -f .docker/images/Dockerfile .
    - docker rmi ${CONTAINER_IMAGE_CRM_LATEST} || true
    - docker push ${CONTAINER_IMAGE_CRM}
    - docker image prune -af

deploy-stage-mngr:
  stage: deploy-swarm-dev
  when: manual
  variables:
    DOMAIN: manager.stage.boostra.ru
    SWARM_STACK_NAME: stage
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master" && $CI_PIPELINE_SOURCE == "merge_request_event"
  needs:
    - build-crm-stage
  allow_failure: true
  tags:
    - develop-deploy
  environment:
    name: stage-mngr
    url: https://manager.stage.boostra.ru
  <<: *deploy_script